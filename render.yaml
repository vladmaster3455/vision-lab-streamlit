services:
  - type: web
    name: bench-object-detection
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DEVICE
        value: cpu
      - key: ENABLE_DINO
        value: "0"
      - key: YOLO_WEIGHTS
        value: yolo11n.pt
      - key: RTDETR_WEIGHTS
        value: rtdetr-l.pt
      - key: DINO_MODEL
        value: dino-4scale_r50_8xb2-12e_coco
      - key: DINO_CONFIG
        value: ""
      - key: DINO_WEIGHTS
        value: ""
